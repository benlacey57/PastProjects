<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideal Glass & Glazing | Bespoke Glass Surrey & London</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .font-heading { font-family: 'Montserrat', sans-serif; }
        .font-body { font-family: 'Inter', sans-serif; }
        /* Ensures the text is always centered over the slide */
        .slider-content-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(0, 51, 102, 0.4); /* Brand Blue Tint */
            z-index: 10;
        }
    </style>
</head>
<body class="font-body text-slate-900">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 h-20">
        <div class="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
            <div class="font-heading font-extrabold text-2xl text-[#003366] tracking-tighter">IDEAL<span class="text-[#FF8C00]">GLASS</span></div>
            <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                <a href="#" class="text-[#FF8C00]">Home</a>
                <a href="#" class="hover:text-[#FF8C00] transition">Products</a>
                <a href="#" class="hover:text-[#FF8C00] transition">Commercial</a>
                <a href="#" class="hover:text-[#FF8C00] transition">About</a>
            </div>
            <a href="tel:02087638222" class="bg-[#003366] text-white px-6 py-3 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-[#FF8C00] transition">020 8763 8222</a>
        </div>
    </nav>

    <section class="relative h-screen w-full overflow-hidden bg-slate-900">
        <div class="absolute inset-0 w-full h-full">
            <img src="https://placehold.co/1920x1080/003366/FFFFFF?text=Bespoke+Glass+Installations" alt="Glass Hero" class="w-full h-full object-cover opacity-60">
            
            <div class="slider-content-overlay px-4">
                <div class="max-w-4xl">
                    <span class="text-[#FF8C00] font-bold text-xs uppercase tracking-[0.5em] mb-4 block">Est. 2004 • Coulsdon</span>
                    <h1 class="text-4xl md:text-7xl font-heading font-extrabold text-white mb-8 leading-tight">
                        Precision Glazing <br>For Modern Living.
                    </h1>
                    <div class="flex flex-col md:flex-row gap-4 justify-center">
                        <a href="#quote" class="bg-[#FF8C00] text-white px-10 py-5 rounded-full font-bold text-[10px] uppercase tracking-widest shadow-xl">Request a Quote</a>
                        <a href="#" class="bg-white/10 backdrop-blur-md text-white border border-white/20 px-10 py-5 rounded-full font-bold text-[10px] uppercase tracking-widest hover:bg-white hover:text-[#003366] transition">View Gallery</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 left-0 right-0 z-20 flex justify-center gap-3">
            <div class="w-3 h-3 bg-[#FF8C00] rounded-full cursor-pointer"></div>
            <div class="w-3 h-3 bg-white/30 rounded-full cursor-pointer"></div>
            <div class="w-3 h-3 bg-white/30 rounded-full cursor-pointer"></div>
        </div>
    </section>

</body>
</html>
